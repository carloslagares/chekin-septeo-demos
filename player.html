<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chekin · Demo</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0a0e27; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  video { width: 100vw; height: 100vh; object-fit: contain; background: #0a0e27; }
  #overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(10,14,39,.55); cursor: pointer; transition: opacity .25s; z-index: 10;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #play {
    width: 96px; height: 96px; border-radius: 50%;
    background: #2f56ff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 48px rgba(47,86,255,.5);
  }
  #play::after { content: ""; border-style: solid; border-width: 22px 0 22px 36px; border-color: transparent transparent transparent #fff; margin-left: 8px; }
  #err { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; color: #8b93c4; font-size: 14px; display: none; }
</style>
</head>
<body>
<video id="v" playsinline controls preload="auto"></video>
<div id="overlay"><div id="play" aria-label="Play"></div></div>
<div id="err">Video unavailable.</div>
<script>
  var FILES = { "guest-checkin": "guest-checkin.mp4", "identity-verification": "identity-verification.mp4" };
  var key = new URLSearchParams(location.search).get("v");
  var v = document.getElementById("v");
  var overlay = document.getElementById("overlay");
  if (FILES[key]) {
    v.src = FILES[key];
  } else {
    document.getElementById("err").style.display = "block";
  }
  function start() {
    overlay.classList.add("hidden");
    v.muted = false;
    var p = v.play();
    if (p && p.catch) p.catch(function(){ v.muted = true; v.play(); });
  }
  overlay.addEventListener("click", start);
  // try autoplay muted immediately; user click adds sound
  v.muted = true;
  v.play().then(function(){ /* playing muted; overlay still shows for sound */ }).catch(function(){});
</script>
</body>
</html>
